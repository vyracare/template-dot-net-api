name: Create Project .NET API

on:
  issues:
    types: [opened]

jobs:
  create-repo:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, '### Nome da API')
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      TEMPLATE_REPOSITORY: ${{ github.repository }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Extrair dados da issue
        shell: bash
        run: |
          python <<'PY'
          import os
          import re

          body = os.environ["ISSUE_BODY"]
          env_path = os.environ["GITHUB_ENV"]

          def extract_field(title: str) -> str:
            pattern = rf"### {re.escape(title)}\s*\n(.*?)(?=\n### |\Z)"
            match = re.search(pattern, body, re.S)
            if not match:
              raise SystemExit(f"Campo não encontrado na issue: {title}")
            return match.group(1).strip()

          def extract_optional_field(title: str) -> str:
            pattern = rf"### {re.escape(title)}\s*\n(.*?)(?=\n### |\Z)"
            match = re.search(pattern, body, re.S)
            if not match:
              return ""
            return match.group(1).strip()

          def normalize_kebab(value: str) -> str:
            value = value.strip().lower()
            value = re.sub(r"[^a-z0-9]+", "-", value)
            value = re.sub(r"-{2,}", "-", value).strip("-")
            if not value.startswith("vyracare-api-"):
              value = f"vyracare-api-{value}"
            return value

          def normalize_snake(value: str) -> str:
            value = value.strip().lower()
            value = re.sub(r"[^a-z0-9]+", "_", value)
            value = re.sub(r"_{2,}", "_", value).strip("_")
            return value

          def normalize_repo_full_name(value: str) -> str:
            value = value.strip()
            if not value:
              return ""
            if "/" in value:
              owner, repo = value.split("/", 1)
              repo = re.sub(r"[^a-z0-9]+", "-", repo.strip().lower())
              repo = re.sub(r"-{2,}", "-", repo).strip("-")
              return f"{owner.strip().lower()}/{repo}"
            value = re.sub(r"[^a-z0-9]+", "-", value.strip().lower())
            value = re.sub(r"-{2,}", "-", value).strip("-")
            return f"vyracare/{value}"

          api_name = normalize_kebab(extract_field("Nome da API"))
          database_name = normalize_snake(extract_field("Nome do banco"))
          table_name = normalize_snake(extract_field("Nome da tabela ou collection"))
          api_description = extract_field("Descrição da API").replace("\r", " ").strip()
          consumer_mfe_repository = normalize_repo_full_name(extract_optional_field("Repositório do MFE consumidor"))
          mongo_connection_string = extract_optional_field("Mongo Connection String").replace("\r", " ").strip()
          jwt_key = extract_optional_field("JWT Key").replace("\r", " ").strip()
          jwt_issuer = extract_optional_field("JWT Issuer").replace("\r", " ").strip()
          jwt_audience = extract_optional_field("JWT Audience").replace("\r", " ").strip()
          jwt_expiry_minutes = extract_optional_field("JWT Expiry Minutes").replace("\r", " ").strip()

          with open(env_path, "a", encoding="utf-8") as env_file:
            env_file.write(f"API_NAME={api_name}\n")
            env_file.write(f"DATABASE_NAME={database_name}\n")
            env_file.write(f"TABLE_NAME={table_name}\n")
            env_file.write(f"CONSUMER_MFE_REPOSITORY={consumer_mfe_repository}\n")
            env_file.write(f"MONGO_CONNECTION_STRING={mongo_connection_string}\n")
            env_file.write(f"JWT_KEY={jwt_key}\n")
            env_file.write(f"JWT_ISSUER={jwt_issuer}\n")
            env_file.write(f"JWT_AUDIENCE={jwt_audience}\n")
            env_file.write(f"JWT_EXPIRY_MINUTES={jwt_expiry_minutes}\n")
            env_file.write(f"API_DESCRIPTION<<EOF\n{api_description}\nEOF\n")
          PY

      - name: Comentar início da automação
        shell: bash
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${TEMPLATE_REPOSITORY}" \
            --body-file - <<EOF
          🚀 A automação de criação da API foi iniciada.

          Acompanhe a execução aqui: ${RUN_URL}
          EOF

      - name: Garantir nome único do repositório
        shell: bash
        run: |
          PROJECT_NAME="${API_NAME}"
          if gh repo view "vyracare/${PROJECT_NAME}" >/dev/null 2>&1; then
            echo "FAILURE_REASON=Já existe um repositório com o nome ${PROJECT_NAME}." >> "$GITHUB_ENV"

            gh issue comment "${{ github.event.issue.number }}" \
              --repo "${TEMPLATE_REPOSITORY}" \
              --body-file - <<EOF
          ⚠️ A automação foi interrompida porque o repositório **${PROJECT_NAME}** já existe.

          Execução: ${RUN_URL}
          EOF

            exit 1
          fi

          echo "PROJECT_NAME=${PROJECT_NAME}" >> "$GITHUB_ENV"

      - name: Criar repositório a partir do template
        shell: bash
        run: |
          gh repo create "vyracare/${PROJECT_NAME}" \
            --public \
            --template "${TEMPLATE_REPOSITORY}" \
            --clone

          gh repo edit "vyracare/${PROJECT_NAME}" \
            --description "${API_DESCRIPTION}" \
            --add-topic "back-end" \
            --add-topic "projeto"

          echo "PROJECT_CREATED=true" >> "$GITHUB_ENV"

      - name: Rodar script de rename
        shell: bash
        run: |
          cd "${PROJECT_NAME}"
          chmod +x rename-dotnet-project.sh
          export CONSUMER_MFE_REPOSITORY="${CONSUMER_MFE_REPOSITORY}"
          export MONGO_CONNECTION_STRING="${MONGO_CONNECTION_STRING}"
          export JWT_KEY="${JWT_KEY}"
          export JWT_ISSUER="${JWT_ISSUER}"
          export JWT_AUDIENCE="${JWT_AUDIENCE}"
          export JWT_EXPIRY_MINUTES="${JWT_EXPIRY_MINUTES}"
          ./rename-dotnet-project.sh "${PROJECT_NAME}" "${DATABASE_NAME}" "${TABLE_NAME}"

      - name: Commit e push das mudanças
        shell: bash
        run: |
          cd "${PROJECT_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/vyracare/${PROJECT_NAME}.git"

          rm -rf .github/ISSUE_TEMPLATE
          rm -f .github/workflows/create-dotnet-project.yml
          rm -f rename-dotnet-project.sh

          git add .
          git commit -m "chore: inicializa ${PROJECT_NAME} a partir do template" || echo "Nada para commitar"
          git push origin main

      - name: Criar branch develop
        shell: bash
        run: |
          cd "${PROJECT_NAME}"
          git checkout -b develop
          git push origin develop
          git checkout main

      - name: Habilitar branch policy em main e develop
        shell: bash
        run: |
          apply_protection() {
            local branch_name="$1"

            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              "/repos/vyracare/${PROJECT_NAME}/branches/${branch_name}/protection" \
              -f required_status_checks= \
              -F enforce_admins=false \
              -f required_pull_request_reviews.dismiss_stale_reviews=true \
              -f required_pull_request_reviews.require_code_owner_reviews=false \
              -F required_pull_request_reviews.required_approving_review_count=1 \
              -F required_conversation_resolution=true \
              -F restrictions= \
              -F allow_force_pushes=false \
              -F allow_deletions=false \
              -F block_creations=false
          }

          apply_protection "main"
          apply_protection "develop"

      - name: Comentar sucesso
        if: success()
        shell: bash
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${TEMPLATE_REPOSITORY}" \
            --body-file - <<EOF
          ✅ A API **${PROJECT_NAME}** foi criada com sucesso.

          Repositório: https://github.com/vyracare/${PROJECT_NAME}
          Execução: ${RUN_URL}
          EOF

      - name: Fechar issue com sucesso
        if: success()
        shell: bash
        run: |
          gh issue close "${{ github.event.issue.number }}" \
            --repo "${TEMPLATE_REPOSITORY}" \
            --comment "✅ Issue encerrada automaticamente após a criação bem-sucedida da API."

      - name: Rollback do repositório criado
        id: rollback
        if: failure() && env.PROJECT_CREATED == 'true'
        continue-on-error: true
        shell: bash
        run: |
          if gh repo delete "vyracare/${PROJECT_NAME}" --yes; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Comentar falha
        if: failure()
        shell: bash
        run: |
          ROLLBACK_MESSAGE="Nenhum repositório precisou ser removido."
          if [ "${PROJECT_CREATED:-false}" = "true" ] && [ "${{ steps.rollback.outputs.status }}" = "success" ]; then
            ROLLBACK_MESSAGE="O rollback removeu o repositório criado e retornou o contexto ao estado inicial."
          elif [ "${PROJECT_CREATED:-false}" = "true" ] && [ "${{ steps.rollback.outputs.status }}" = "failed" ]; then
            ROLLBACK_MESSAGE="O rollback foi iniciado, mas a exclusão do repositório falhou. Verifique se o token PAT_TOKEN possui o escopo delete_repo."
          fi

          FAILURE_DETAILS="${FAILURE_REASON:-Falha durante a execução da automação.}"

          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${TEMPLATE_REPOSITORY}" \
            --body-file - <<EOF
          ❌ A automação falhou durante a criação da API.

          Execução: ${RUN_URL}
          Motivo: ${FAILURE_DETAILS}

          ${ROLLBACK_MESSAGE}
          EOF
